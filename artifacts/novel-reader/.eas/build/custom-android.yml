build:
  name: Custom Android APK build
  steps:
    - eas/checkout
    - run:
        name: Enable corepack and install pnpm
        command: corepack enable && corepack prepare pnpm@10.26.1 --activate
    - run:
        name: Install dependencies
        command: pnpm install --no-frozen-lockfile
    - eas/prebuild
    - eas/run_gradle
