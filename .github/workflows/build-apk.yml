name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Install Expo packages
        working-directory: artifacts/novel-reader
        run: pnpm add expo-file-system expo-sharing && pnpm install --no-frozen-lockfile

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Initialize EAS project
        working-directory: artifacts/novel-reader
        run: eas init --non-interactive --force

      - name: Build Android APK
        working-directory: artifacts/novel-reader
        run: eas build --platform android --profile preview --non-interactive --local
        env:
          APP_BUILD_NUMBER: ${{ github.run_number }}
        
      - name: Rename APK to Custom Format
        working-directory: artifacts/novel-reader
        run: |
          # 1. Get version from package.json (e.g., 1.0.5)
          VERSION=$(node -p "require('./package.json').version")
          
          # 2. Get the GitHub Run Number (e.g., 55)
          REV=${{ github.run_number }}
          
          # 3. Create a clean folder for the output
          mkdir -p ../../build-output
          
          # 4. Find the APK generated by EAS and move/rename it
          # We use "v${VERSION}rev${REV}" to get "v1.0.5rev55"
          find . -name "*.apk" -type f -exec mv {} ../../build-output/NovelDR\ v${VERSION}rev${REV}.apk \;
          
          echo "Successfully renamed APK to: NovelDR v${VERSION}rev${REV}.apk"
          
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: novel-reader-apk
          # Points to the new folder and the specific renamed file
          path: build-output/*.apk
          if-no-files-found: error
          
