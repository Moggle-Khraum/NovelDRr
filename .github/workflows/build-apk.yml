name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Verify axios and cheerio are installed
        working-directory: artifacts/novel-reader
        run: |
          echo "Checking if axios is installed..."
          pnpm list axios || echo "ERROR: axios not found!"
          echo "Checking if cheerio is installed..."
          pnpm list cheerio || echo "ERROR: cheerio not found!"
          echo "If missing, check your package.json and pnpm-lock.yaml"

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Initialize EAS project
        working-directory: artifacts/novel-reader
        run: eas init --non-interactive --force

      - name: Build Android APK
        working-directory: artifacts/novel-reader
        run: eas build --platform android --profile preview --non-interactive

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: novel-reader-apk
          path: artifacts/novel-reader/*.apk
          if-no-files-found: error
