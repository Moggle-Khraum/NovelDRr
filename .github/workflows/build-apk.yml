name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android APK
        working-directory: artifacts/novel-reader
        run: eas build --platform android --profile preview --non-interactive

      - name: Download and upload APK artifact
        run: |
          BUILD_URL=$(cd artifacts/novel-reader && eas build:list --platform android --status finished --limit 1 --json --non-interactive | python3 -c "import sys,json; builds=json.load(sys.stdin); print(builds[0]['artifacts']['buildUrl'])" 2>/dev/null || echo "")
          if [ -n "$BUILD_URL" ]; then
            curl -L "$BUILD_URL" -o novel-dr.apk
          fi
        continue-on-error: true

      - name: Upload APK to GitHub artifacts
        uses: actions/upload-artifact@v4
        with:
          name: novel-dr-apk
          path: "*.apk"
          if-no-files-found: ignore
